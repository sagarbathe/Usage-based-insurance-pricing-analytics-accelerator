# Streamlit configuration for Azure App Service deployment.
# The WEBSITES_PORT env var (set by Azure) tells App Service which port
# to forward traffic to.  The startup script passes --server.port=$PORT.

[server]
headless = true
address = "0.0.0.0"
port = 8000
enableCORS = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false
